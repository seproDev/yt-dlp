name: Release (master)
on:
  push:
    branches:
      - 3.9test
    paths:
      - "yt_dlp/**.py"
      - "!yt_dlp/version.py"
      - "bundle/*.py"
      - "pyproject.toml"
      - "Makefile"
      - ".github/workflows/build.yml"
concurrency:
  group: release-master
permissions:
  contents: read

jobs:
  release:
    if: vars.BUILD_MASTER != ''
    uses: ./.github/workflows/release.yml
    with:
      prerelease: true
      source: 3.9test
    permissions:
      contents: write
      packages: write  # For package cache
      actions: write  # For cleaning up cache
      id-token: write  # mandatory for trusted publishing
    secrets: inherit
